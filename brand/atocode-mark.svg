<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">ATOCODE mark</title>
  <desc id="desc">A geometric A monogram framed by code brackets in violet and cyan.</desc>
  <defs>
    <linearGradient id="markGradient" x1="112" x2="400" y1="112" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="0.52" stop-color="#3388ff"/>
      <stop offset="1" stop-color="#2dd4ff"/>
    </linearGradient>
    <linearGradient id="bracketGradient" x1="78" x2="434" y1="132" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a855f7"/>
      <stop offset="0.5" stop-color="#ff4fd8"/>
      <stop offset="1" stop-color="#2dd4ff"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.55 0 0 0 0 0.36 0 0 0 0 1 0 0 0 0.72 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="#05060b"/>
  <path d="M0 178h512M0 334h512M178 0v512M334 0v512" stroke="#c1c8ff" stroke-opacity="0.055" stroke-width="2"/>
  <path d="M166 130 82 256l84 126" fill="none" stroke="url(#bracketGradient)" stroke-linecap="round" stroke-linejoin="round" stroke-width="30" opacity="0.88"/>
  <path d="M346 130 430 256 346 382" fill="none" stroke="url(#bracketGradient)" stroke-linecap="round" stroke-linejoin="round" stroke-width="30" opacity="0.88"/>
  <g filter="url(#softGlow)">
    <path d="M167 378 239 151c5-16 29-16 34 0l72 227" fill="none" stroke="url(#markGradient)" stroke-linecap="round" stroke-linejoin="round" stroke-width="44"/>
    <path d="M211 296h90" fill="none" stroke="#f8fbff" stroke-linecap="round" stroke-width="34"/>
  </g>
  <path d="M262 166 221 348" fill="none" stroke="#05060b" stroke-linecap="round" stroke-width="12" opacity="0.82"/>
</svg>
